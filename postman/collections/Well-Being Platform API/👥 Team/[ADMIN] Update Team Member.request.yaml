$kind: http-request
description: |-
  Admin only. Multipart partial update. Optional photo — add form-data key `photo` (File) only when uploading; pick a file, not a folder.
url: "{{baseUrl}}/api/team/{{teamMemberId}}"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: role
      value: Founder & CEO
    - type: text
      key: isPublished
      value: "true"
order: 5000
