$kind: http-request
description: "Requires an existing hashed password on the account. Google-only accounts (no password): use Forgot password flow or omit this call. Incorrect currentPassword returns 401."
url: "{{baseUrl}}/api/auth/password"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "currentPassword": "Admin@1234",
      "newPassword": "NewPassword123"
    }
order: 6000
