$kind: http-request
description: Admin only. Paginated { data, meta }. Each row includes status and paymentExpiresAt for badges (PENDING_PAYMENT, CONFIRMED, EXPIRED, CANCELLED). Default lists all statuses; optional query ?status=CONFIRMED etc.
url: "{{baseUrl}}/api/camps/{{campId}}/participants?page=1&limit=20"
method: GET
headers:
  Authorization: Bearer {{authToken}}
queryParams:
  - key: page
    value: "1"
  - key: limit
    value: "20"
  - key: status
    value: CONFIRMED
    disabled: true
    description: "Optional filter: PENDING_PAYMENT | CONFIRMED | EXPIRED | CANCELLED (omit for all)"
order: 10000
