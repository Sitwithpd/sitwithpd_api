$kind: http-request
description: Next upcoming camp (earliest UPCOMING) for the landing page. Test script saves campId and first campTierId when present.
url: "{{baseUrl}}/api/camps/current"
method: GET
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('campId', res.data.id);
      }
      if (res.data && res.data.tiers && res.data.tiers.length > 0) {
        pm.collectionVariables.set('campTierId', res.data.tiers[0].id);
      }
    language: text/javascript
order: 3000
