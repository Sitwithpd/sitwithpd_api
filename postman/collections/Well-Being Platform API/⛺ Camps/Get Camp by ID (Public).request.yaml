$kind: http-request
description: Returns full camp details including tiers, images, published testimonials, benefits, seatsTaken, and seatsRemaining.
url: "{{baseUrl}}/api/camps/{{campId}}"
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.tiers && res.data.tiers.length > 0) {
        pm.collectionVariables.set('campTierId', res.data.tiers[0].id);
      }
    language: text/javascript
order: 4000
