$kind: http-request
description: Admin only. Multipart field images (repeat). Optional captions JSON array.
url: "{{baseUrl}}/api/camps/{{campId}}/images"
method: POST
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: captions
      value: '["Group discussion","Journaling","Walking in nature","Calm conversations"]'
      description: Optional JSON array aligned with files
    - type: file
      key: images
      src:
        - ""
      description: Repeat field images for multiple uploads (max 12)
    - type: file
      key: images
      src:
        - ""
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.length && res.data[0].id) {
        pm.collectionVariables.set('campImageId', res.data[0].id);
      }
    language: text/javascript
order: 14000
