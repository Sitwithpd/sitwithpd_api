$kind: http-request
description: "Admin only. Paginated. Optional filters: search, status (ConsultationStatus). Response: { data, meta }."
url: "{{baseUrl}}/api/consultations?page=1&limit=20&search=&status="
method: GET
headers:
  Authorization: Bearer {{authToken}}
queryParams:
  - key: page
    value: "1"
  - key: limit
    value: "20"
  - key: search
    value: ""
    description: Substring on user first/last/email and service title (case-insensitive). Max 100 chars.
  - key: status
    value: ""
    description: PENDING | PENDING_PAYMENT | CONFIRMED | CANCELLED | COMPLETED
order: 5000
