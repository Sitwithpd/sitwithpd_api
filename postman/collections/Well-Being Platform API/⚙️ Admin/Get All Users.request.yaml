$kind: http-request
description: "Admin only. Optional `search` filters by firstName, lastName, or email. `data` is the users array (not `data.users`). Includes `meta`: total, page, limit, totalPages."
url: "{{baseUrl}}/api/admin/users?page=1&limit=20&search="
method: GET
headers:
  Authorization: Bearer {{authToken}}
queryParams:
  - key: page
    value: "1"
  - key: limit
    value: "20"
  - key: search
    value: ""
    description: Optional. Matches substring against first name, last name, or email (case-insensitive). Max 100 characters.
order: 2000
