$kind: http-request
description: >-
  Send a user message (JSON response). Requires session cookies. Run
  `npm run chat:reindex` after deploy so RAG has indexed content.
url: "{{baseUrl}}/api/chat/sessions/{{chatSessionId}}/messages"
method: POST
headers:
  Content-Type: application/json
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "message": "What programs do you offer?",
      "stream": false
    }
order: 1300
