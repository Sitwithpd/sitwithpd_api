$kind: http-request
description: |-
  Purchases (with `progress` for successful programme payments), camp registrations, and consultations.

  Camp registrations include `status`, `paymentExpiresAt`, and nested `payment`
  (`status`, `amount`, `createdAt`) so the client can show “Complete payment”
  with a countdown when `status === PENDING_PAYMENT` and the deadline is still
  in the future.

  Programme `progress` lists week stats, percentComplete, isProgramCompleted, programCompletedAt.
url: "{{baseUrl}}/api/dashboard"
method: GET
headers:
  Authorization: Bearer {{authToken}}
order: 1000
