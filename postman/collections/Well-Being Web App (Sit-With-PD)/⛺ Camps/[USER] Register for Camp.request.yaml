$kind: http-request
description: >-
  Submits or refreshes a camp application for the logged-in user. `tierId` is
  required — the camp must have at least one tier configured. Include
  `applicantDetails` (dietary info, emergency contact, partyMembers for
  Couple/Family, etc.).

  Success response (201): `data` includes the registration `id`, `status`
  (`PENDING_PAYMENT`), `paymentExpiresAt` (ISO timestamp — complete Paystack
  within ~60 minutes), `tier`, `camp`, `participantCount`, `applicantDetails`.
  Message text:

  `Application submitted. Please complete payment within 60 minutes.`

  Next step: POST `/api/payments/initialize` with `type: "CAMP"` and
  `itemId` = registration `id`.

  Error messages you may see when re-posting:

  - **Already confirmed:** `You have already applied for this camp.` (repeat
    attempt while `status` is `CONFIRMED`)

  - **Resume payment:** `You have a pending application for this camp. Complete
    payment for it or wait for it to expire before re-applying.` (hold still
    active — use initialize payment or wait for expiry)

  - **Late webhook / refund queue:** `A previous payment is pending review.
    Please contact support before re-applying.` (linked payment `SUCCESS` but
    registration not confirmed — ops must refund before retry)

  After the expiry worker marks the row `EXPIRED`, posting again **reuses**
  the same registration row (same `id`), resets `status` to `PENDING_PAYMENT`,
  and issues a fresh `paymentExpiresAt`.

url: "{{baseUrl}}/api/camps/{{campId}}/register"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tierId": "{{campTierId}}",
      "applicantDetails": {
        "fullName": "Jane Doe",
        "phone": "+2348000000000",
        "emergencyContact": {
          "name": "John Doe",
          "phone": "+2348000000001",
          "relationship": "Spouse"
        },
        "dietaryRestrictions": "Vegetarian",
        "accommodationPreference": "Ground floor if possible",
        "partyMembers": [],
        "notes": "First time attending."
      }
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('campRegistrationId', res.data.id);
        console.log('Camp Registration ID saved:', res.data.id);
      }
    language: text/javascript
order: 3000
